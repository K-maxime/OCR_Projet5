<div class="subjects">  

  @for (subject of (subjects$ | async); track subject) {  
      <mat-card class="subject">
        <mat-card-header>
              <mat-card-title>{{ subject.name }}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p>
            {{ subject.description }}
          </p>
        </mat-card-content>          
        @if (!subject.subscribed){
          <mat-card-actions>
                <button (click)="subscribe(subject.id)">
                  <span>S'abonner'</span>
                </button>       
          </mat-card-actions>
        }
        @else {
          <mat-card-actions>
                <button>
                  <span>Déja abonné</span>
                </button>       
          </mat-card-actions>
        }
      </mat-card>
  }
</div>

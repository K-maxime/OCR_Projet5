# ============================================================
# APPLICATION CONFIGURATION
# ============================================================
spring.application.name=mdd-api
server.port=9090
server.servlet.context-path=/api
spring.profiles.active=local

# ============================================================
# DATABASE CONFIGURATION (MySQL)
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/mdd_database
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================================================
# LOGGING CONFIGURATION
# ============================================================
logging.level.root=INFO
logging.level.com.openclassrooms.mddapi=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ============================================================
# JWT CONFIGURATION
# ============================================================
jwt.secret=MyVerySecureSecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!!!
jwt.expiration=86400000